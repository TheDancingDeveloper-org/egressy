name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
  pull_request:
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-and-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97
          components: rustfmt,clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all-targets
      - run: python3 -m unittest external-probe/test_external_probe_service.py
      - run: cargo build --locked --release --bins
      - run: tests/probe-network.sh

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - working-directory: ui
        run: npm ci
      - working-directory: ui
        run: npm test
      - working-directory: ui
        run: npm run build
      - working-directory: ui
        run: git diff --exit-code -- src/generated.ts dist/index.html
      - working-directory: ui
        run: npx playwright install --with-deps chromium
      - working-directory: ui
        run: npm run test:e2e
