name: Container images

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
  pull_request:
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, node-b, linux, x64, docker]
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Gateway image metadata
        id: gateway
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build gateway image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.gateway.outputs.tags }}
          labels: ${{ steps.gateway.outputs.labels }}
          cache-from: ${{ github.event_name != 'pull_request' && 'type=gha,scope=gateway' || '' }}
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max,scope=gateway' || '' }}
      - name: External validator image metadata
        id: validator
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-external-probe
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build external validator image
        uses: docker/build-push-action@v7
        with:
          context: external-probe
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.validator.outputs.tags }}
          labels: ${{ steps.validator.outputs.labels }}
          cache-from: ${{ github.event_name != 'pull_request' && 'type=gha,scope=external-probe' || '' }}
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max,scope=external-probe' || '' }}
