global
    log stdout format raw daemon
    maxconn 64

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout http-request 10s
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend docker_api
    bind :2375

    # Egressy currently uses exactly two read operations. Docker may prefix
    # requests with a negotiated API version; query parameters are excluded
    # from HAProxy's path match.
    acl method_get method GET
    acl containers_list path_reg -i ^(/v[0-9.]+)?/containers/json/?$
    acl network_inspect path_reg -i ^(/v[0-9.]+)?/networks/[A-Za-z0-9_.-]+/?$

    http-request allow if method_get containers_list
    http-request allow if method_get network_inspect
    http-request deny deny_status 403

    default_backend docker_socket

backend docker_socket
    server docker /var/run/docker.sock
